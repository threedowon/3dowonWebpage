<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>3Dowon — Admin</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header class="admin-header">
    <h1>3Dowon Admin</h1>
    <p class="admin-note">로컬 전용 도구입니다. 저장하면 content/*.json과 HTML이 바로 수정되니, 완료 후 git으로 확인하고 커밋하세요.</p>
    <nav class="admin-tabs">
      <button class="admin-tab active" data-tab="works">Works</button>
      <button class="admin-tab" data-tab="about">About</button>
      <button class="admin-tab" data-tab="cv">CV</button>
      <button class="admin-tab" data-tab="lab">Lab</button>
      <button class="admin-tab" data-tab="site">Site</button>
    </nav>
  </header>

  <main>
    <section id="tab-works" class="admin-panel active">
      <h2>새 작업 추가</h2>
      <form id="newWorkForm" class="admin-form">
        <div class="field-row">
          <label>슬러그 (영문/숫자/하이픈)<input name="slug" required pattern="[a-z0-9]+(-[a-z0-9]+)*" placeholder="new-work" /></label>
          <label>작업명<input name="title" required /></label>
        </div>
        <div class="field-row">
          <label>연도<input name="year" type="number" /></label>
          <label>유형
            <select name="type">
              <option>설치</option><option>영상</option><option>퍼포먼스</option><option>전시</option>
            </select>
          </label>
        </div>
        <button type="submit">추가</button>
      </form>

      <h2>작업 목록</h2>
      <div id="worksList" class="works-list"></div>
    </section>

    <section id="tab-about" class="admin-panel">
      <h2>About</h2>
      <form id="aboutForm" class="admin-form">
        <label>이름<input name="name" /></label>
        <label>메타 (줄바꿈으로 구분, 예: 역할 / 출생정보)<textarea name="meta" rows="2"></textarea></label>
        <label>본문 (문단은 빈 줄로 구분)<textarea name="body" rows="8"></textarea></label>
        <button type="submit">저장</button>
      </form>
      <div class="image-box">
        <img id="aboutImagePreview" alt="about" />
        <input type="file" id="aboutImageInput" accept="image/*" />
      </div>
    </section>

    <section id="tab-cv" class="admin-panel">
      <h2>CV</h2>
      <div id="cvSections"></div>
      <button id="addCvSection" type="button">섹션 추가</button>
      <button id="saveCv" type="button">저장</button>
    </section>

    <section id="tab-lab" class="admin-panel">
      <h2>Lab</h2>
      <form id="newLabForm" class="admin-form">
        <label>캡션<input name="caption" required /></label>
        <input type="file" id="labImageInput" accept="image/*" required />
        <button type="submit">추가</button>
      </form>
      <div id="labList" class="lab-list"></div>
    </section>

    <section id="tab-site" class="admin-panel">
      <h2>연락처 / SNS</h2>
      <form id="siteForm" class="admin-form">
        <label>이메일<input name="email" /></label>
        <label>Instagram URL<input name="instagram" /></label>
        <label>Vimeo URL<input name="vimeo" /></label>
        <label>YouTube URL<input name="youtube" /></label>
        <button type="submit">저장</button>
      </form>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
