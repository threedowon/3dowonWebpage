name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site from content
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage public site files
        run: |
          SITE_DIR="$RUNNER_TEMP/_site"
          mkdir -p "$SITE_DIR"
          cp -r . "$SITE_DIR/"
          rm -rf "$SITE_DIR"/admin "$SITE_DIR"/scripts "$SITE_DIR"/content "$SITE_DIR"/node_modules \
            "$SITE_DIR"/package.json "$SITE_DIR"/package-lock.json "$SITE_DIR"/.github "$SITE_DIR"/.git

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '${{ runner.temp }}/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
